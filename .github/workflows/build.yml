name: CUPS Snap CI - Unified Build Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: read
jobs:
  # Job 1: Native builds for amd64 and arm64
  build-native:
    name: Build Native (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout cups-snap sources
        uses: actions/checkout@v4

      - name: Print Ubuntu version
        run: |
          set -e
          cat /etc/os-release | grep PRETTY_NAME | awk -F '=' '{print $2}'

      - name: Build CUPS snap with Snapcraft action
        id: snapcraft
        uses: snapcore/action-build@v1
        with:
          path: .

      - name: Install built snap (smoke test setup)
        run: |
          set -e
          SNAP_FILE="${{ steps.snapcraft.outputs.snap }}"
          echo "Installing snap: ${SNAP_FILE}"
          sudo snap install --dangerous "${SNAP_FILE}"

      - name: Run smoke tests
        run: |
          set -e
          echo "Checking snap list..."
          snap list | grep "^cups " || (echo "CUPS snap not found in snap list"; exit 1)
          
          echo "Testing ghostscript binary..."
          snap run cups.gs -h || true

      - name: Cleanup - Remove installed snap
        if: always()
        run: |
          echo "Removing CUPS snap..."
          sudo snap remove cups || true

      - name: Upload CUPS snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: cups-snap-${{ matrix.arch }}
          path: ./*.snap
          if-no-files-found: error

  # Job 2: Remote build via Launchpad for armhf
  # Job 2: Remote build via Launchpad for armhf
  build-remote:
    name: Build Remote (armhf)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cups-snap sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Launchpad Credentials
        id: check-secrets
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          if [ -z "$LP_CREDENTIALS" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Notice: Launchpad credentials not available (likely a PR from a fork). Skipping remote build."
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Snapcraft
        if: steps.check-secrets.outputs.available == 'true'
        run: |
          sudo snap install snapcraft --channel latest/stable --classic

      - name: Setup Launchpad credentials
        if: steps.check-secrets.outputs.available == 'true'
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          set -e
          mkdir -p ~/.local/share/snapcraft/provider/launchpad ~/.local/share/snapcraft
          echo "$LP_CREDENTIALS" > ~/.local/share/snapcraft/provider/launchpad/credentials
          echo "$LP_CREDENTIALS" > ~/.local/share/snapcraft/launchpad-credentials

      - name: Remote build CUPS snap on Launchpad
        if: steps.check-secrets.outputs.available == 'true'
        run: |
          set -e
          snapcraft remote-build --launchpad-accept-public-upload --build-for=armhf

      - name: Upload CUPS snap artifact
        if: steps.check-secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cups-snap-armhf
          path: ./*.snap
          if-no-files-found: error