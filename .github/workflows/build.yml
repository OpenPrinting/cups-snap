name: CUPS Snap CI - Native Build Pipeline
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:


jobs:
  build-snap:
    name: Build CUPS Snap (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 native build on standard Ubuntu runner
          - arch: x86_64
            runs-on: ubuntu-latest

          # arm64 native build on ARM64-capable runner
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout cups-snap sources
        uses: actions/checkout@v4
      - name: Print Ubuntu version
        run: |
          set -e
          cat /etc/os-release | grep PRETTY_NAME | awk -F '=' '{print $2}'
      - name: Build CUPS snap with Snapcraft action
        id: snapcraft
        uses: snapcore/action-build@v1
        with:
          path: .
      - name: Install built snap (smoke test setup)
        run: |
          set -e
          SNAP_FILE="${{ steps.snapcraft.outputs.snap }}"
          echo "Installing snap: ${SNAP_FILE}"
          sudo snap install --dangerous "${SNAP_FILE}"
      - name: Run smoke tests
        run: |
          set -e
          
          # Verify snap is listed
          echo "Checking snap list..."
          snap list | grep "^cups " || (echo "CUPS snap not found in snap list"; exit 1)
          
          # Test ghostscript binary with -h flag
          echo "Testing ghostscript binary..."
          snap run cups.gs -h || true

      - name: Cleanup - Remove installed snap
        if: always()
        run: |
          echo "Removing CUPS snap..."
          sudo snap remove cups || true

      - name: Upload CUPS snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: cups-snap-${{ matrix.arch }}
          path: ./*.snap
          if-no-files-found: error